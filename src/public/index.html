<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse SMS - Admin Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="loading">
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>Loading Dashboard...</span>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-brand">Pulse SMS</span>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                    <span class="nav-icon">📊</span>
                    <span>Home</span>
                </a>
                <a href="#" class="nav-item" data-page="users" onclick="switchPage('users')">
                    <span class="nav-icon">👥</span>
                    <span>Users</span>
                </a>
                <a href="#" class="nav-item" data-page="orders" onclick="switchPage('orders')">
                    <span class="nav-icon">🛒</span>
                    <span>Orders</span>
                </a>
                <a href="#" class="nav-item" data-page="deposits" onclick="switchPage('deposits')">
                    <span class="nav-icon">💳</span>
                    <span>Finance</span>
                </a>
                <a href="#" class="nav-item" data-page="settings" onclick="switchPage('settings')">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div id="main-wrapper">
            <!-- Top Bar -->
            <header id="topbar">
                <button id="hamburger" onclick="toggleSidebar()">
                    <span></span><span></span><span></span>
                </button>
                <h1 id="page-title">Overview</h1>
                <div class="topbar-avatar" id="admin-avatar">AD</div>
            </header>

            <!-- Page: Dashboard / Home -->
            <main id="page-dashboard" class="page active">
                <div class="section-group">
                    <div class="section-title"><span>👥</span> Users</div>
                    <div class="info-card">
                        <span class="info-label">TOTAL USERS</span>
                        <span class="info-value color-cyan" id="stat-total-users">0</span>
                    </div>
                </div>

                <div class="section-group">
                    <div class="section-title"><span>📦</span> Orders</div>
                    <div class="info-card">
                        <span class="info-label">TOTAL ORDERS</span>
                        <span class="info-value color-purple" id="stat-total-orders">0</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">COMPLETED</span>
                        <span class="info-value color-green" id="stat-total-sales">0</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">PENDING</span>
                        <span class="info-value color-orange" id="stat-pending-orders">0</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">CANCELLED</span>
                        <span class="info-value color-red" id="stat-cancelled-orders">0</span>
                    </div>
                </div>

                <div class="section-group">
                    <div class="section-title"><span>💰</span> Finance</div>
                    <div class="info-card">
                        <span class="info-label">TOTAL REVENUE</span>
                        <span class="info-value color-green" id="stat-total-revenue">$0.00</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">PENDING DEPOSITS</span>
                        <span class="info-value color-orange" id="stat-pending-deposits">0</span>
                    </div>
                </div>
            </main>

            <!-- Page: Users -->
            <main id="page-users" class="page">
                <div class="page-toolbar">
                    <div class="search-box">
                        <input type="text" id="user-search" placeholder="🔍 Search users...">
                    </div>
                </div>
                <div class="data-list" id="users-list"></div>
            </main>

            <!-- Page: Orders -->
            <main id="page-orders" class="page">
                <div class="page-toolbar">
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="ALL" onclick="filterOrders('ALL')">All</button>
                        <button class="filter-tab" data-filter="COMPLETED" onclick="filterOrders('COMPLETED')">Completed</button>
                        <button class="filter-tab" data-filter="PENDING" onclick="filterOrders('PENDING')">Pending</button>
                        <button class="filter-tab" data-filter="CANCELLED" onclick="filterOrders('CANCELLED')">Cancelled</button>
                    </div>
                </div>
                <div class="data-list" id="orders-list"></div>
            </main>

            <!-- Page: Deposits -->
            <main id="page-deposits" class="page">
                <div class="page-toolbar">
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="ALL" onclick="filterDeposits('ALL')">All</button>
                        <button class="filter-tab" data-filter="PENDING" onclick="filterDeposits('PENDING')">Pending</button>
                        <button class="filter-tab" data-filter="APPROVED" onclick="filterDeposits('APPROVED')">Approved</button>
                        <button class="filter-tab" data-filter="REJECTED" onclick="filterDeposits('REJECTED')">Rejected</button>
                    </div>
                </div>
                <div class="data-list" id="deposits-list"></div>
            </main>

            <!-- Page: Settings -->
            <main id="page-settings" class="page">
                <div class="section-group">
                    <div class="section-title"><span>⚙️</span> Settings</div>
                    <div class="info-card"><span class="info-label">Coming Soon</span><span class="info-value color-purple">🚧</span></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Balance Modal -->
    <div id="balance-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💰 Update Balance</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <p id="target-user-display"></p>
            <input type="number" id="balance-amount" step="0.01" placeholder="Enter amount (e.g. 5.00)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" id="confirm-balance-btn" onclick="performBalanceUpdate()">Update</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
